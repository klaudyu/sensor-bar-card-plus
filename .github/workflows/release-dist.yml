name: Build release artifact

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build dist
        run: |
          mkdir -p dist
          cp src/sensor-bar-card-plus.js dist/sensor-bar-card-plus.js

      - name: Verify dist is up to date
        run: |
          diff -u src/sensor-bar-card-plus.js dist/sensor-bar-card-plus.js

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sensor-bar-card-plus.js
