# Sensor Bar Card Plus Playground package
# Install this file through Home Assistant packages so the dashboard can run
# without any real production sensors.

input_number:
  sbcp_current_value:
    name: SBCP Current Value
    min: -5000
    max: 10000
    step: 0.1
    mode: box
    initial: 42.7
    unit_of_measurement: W

  sbcp_min_value:
    name: SBCP Wave Min Value
    min: -5000
    max: 10000
    step: 1
    mode: box
    initial: 0
    unit_of_measurement: W

  sbcp_max_value:
    name: SBCP Wave Max Value
    min: -5000
    max: 10000
    step: 1
    mode: box
    initial: 100
    unit_of_measurement: W

  sbcp_scale_min_value:
    name: SBCP Scale Min Value
    min: -5000
    max: 10000
    step: 1
    mode: box
    initial: 0
    unit_of_measurement: W

  sbcp_scale_max_value:
    name: SBCP Scale Max Value
    min: -5000
    max: 10000
    step: 1
    mode: box
    initial: 100
    unit_of_measurement: W

  sbcp_target_value:
    name: SBCP Target Value
    min: -5000
    max: 10000
    step: 0.1
    mode: box
    initial: 65
    unit_of_measurement: W

  sbcp_baseline_value:
    name: SBCP Baseline Value
    min: -5000
    max: 10000
    step: 0.1
    mode: box
    initial: 0
    unit_of_measurement: W

  sbcp_current_quick:
    name: SBCP Current Quick Slider
    min: -100
    max: 100
    step: 0.1
    mode: slider
    initial: 42.7
    unit_of_measurement: W

  sbcp_target_quick:
    name: SBCP Target Quick Slider
    min: -100
    max: 100
    step: 0.1
    mode: slider
    initial: 65
    unit_of_measurement: W

  sbcp_baseline_quick:
    name: SBCP Baseline Quick Slider
    min: -100
    max: 100
    step: 0.1
    mode: slider
    initial: 0
    unit_of_measurement: W

  sbcp_bar_height:
    name: SBCP Bar Height
    min: 24
    max: 52
    step: 14
    mode: slider
    initial: 38
    unit_of_measurement: px

  sbcp_decimal_precision:
    name: SBCP Decimal Precision
    min: 0
    max: 2
    step: 1
    mode: slider
    initial: 1

  sbcp_wave_period:
    name: SBCP Wave Period
    min: 4
    max: 60
    step: 1
    mode: slider
    initial: 12
    unit_of_measurement: s

  sbcp_showcase_phase:
    name: SBCP Showcase Phase
    min: 0
    max: 359
    step: 1
    mode: box
    initial: 0

  sbcp_hero_phase:
    name: SBCP Hero Simulation Time
    min: 0
    max: 86399
    step: 0.1
    mode: box
    initial: 0

  sbcp_hero_simulation_speed:
    name: SBCP Hero Simulation Speed
    min: 60
    max: 21600
    step: 60
    mode: box
    initial: 3600
    unit_of_measurement: s/h

input_boolean:
  sbcp_animated:
    name: SBCP Animated
    initial: true

  sbcp_target_enabled:
    name: SBCP Target Enabled
    initial: true

  sbcp_above_target_enabled:
    name: SBCP Above Target Enabled
    initial: true

  sbcp_show_target_label:
    name: SBCP Show Target Label
    initial: true

  sbcp_show_peak:
    name: SBCP Show Peak
    initial: true

  sbcp_wave_enabled:
    name: SBCP Wave Enabled
    initial: false

  sbcp_showcase_enabled:
    name: SBCP Showcase Enabled
    initial: true

  sbcp_hero_showcase_enabled:
    name: SBCP Hero Showcase Enabled
    initial: true

  sbcp_hero_simulation_enabled:
    name: SBCP Hero Simulation Enabled
    initial: true

input_select:
  sbcp_color_mode:
    name: SBCP Color Mode
    options:
      - gradient
      - severity
      - severity_gradient
      - single
    initial: gradient

  sbcp_label_mode:
    name: SBCP Label Mode
    options:
      - left
      - above
      - inside
      - "off"
    initial: left

  sbcp_waveform:
    name: SBCP Waveform
    options:
      - sine
      - triangle
      - random
    initial: sine

  sbcp_wave_target:
    name: SBCP Wave Target
    options:
      - current_value
      - target_value
      - baseline_value
    initial: current_value

  sbcp_baseline_semantic_mode:
    name: SBCP Baseline Semantic Mode
    options:
      - gradient
      - severity
      - severity_gradient
    initial: gradient

  sbcp_baseline_interval_profile:
    name: SBCP Baseline Interval Profile
    options:
      - very_small
      - irregular
      - even
      - full_width
    initial: even

input_text:
  sbcp_label:
    name: SBCP Label
    initial: Playground Sensor
    max: 80

  sbcp_long_label:
    name: SBCP Long Label
    initial: Extremely Long Friendly Sensor Label For Alignment, Overflow, And Screenshot Testing
    max: 255

  sbcp_custom_raw_state:
    name: SBCP Custom Raw State
    initial: noisy-state
    max: 80

template:
  - sensor:
      # Primary playground sensor. This is the entity most demo cards consume.
      - name: Playground Sensor
        default_entity_id: sensor.sbcp_playground_sensor
        unit_of_measurement: W
        icon: mdi:flash
        state: "{{ states('input_number.sbcp_current_value') | float(0) }}"
      # Helper values are mirrored as ordinary sensors so the card under test
      # always consumes entity states rather than helper entities directly.
      - name: SBCP Playground Wave Min
        default_entity_id: sensor.sbcp_playground_min
        unit_of_measurement: W
        icon: mdi:arrow-collapse-left
        state: "{{ states('input_number.sbcp_min_value') | float(0) }}"
      - name: SBCP Playground Wave Max
        default_entity_id: sensor.sbcp_playground_max
        unit_of_measurement: W
        icon: mdi:arrow-collapse-right
        state: "{{ states('input_number.sbcp_max_value') | float(0) }}"
      - name: SBCP Playground Scale Min
        default_entity_id: sensor.sbcp_playground_scale_min
        unit_of_measurement: W
        icon: mdi:arrow-expand-left
        state: "{{ states('input_number.sbcp_scale_min_value') | float(0) }}"
      - name: SBCP Playground Scale Max
        default_entity_id: sensor.sbcp_playground_scale_max
        unit_of_measurement: W
        icon: mdi:arrow-expand-right
        state: "{{ states('input_number.sbcp_scale_max_value') | float(0) }}"
      - name: SBCP Playground Target
        default_entity_id: sensor.sbcp_playground_target
        unit_of_measurement: W
        icon: mdi:bullseye-arrow
        state: "{{ states('input_number.sbcp_target_value') | float(0) }}"
      - name: SBCP Playground Bar Height
        default_entity_id: sensor.sbcp_playground_bar_height
        unit_of_measurement: px
        icon: mdi:arrow-expand-vertical
        state: "{{ states('input_number.sbcp_bar_height') | int(38) }}"
      - name: SBCP Playground Decimal Precision
        default_entity_id: sensor.sbcp_playground_decimal_precision
        icon: mdi:decimal
        state: "{{ states('input_number.sbcp_decimal_precision') | int(1) }}"
      - name: SBCP Playground Color Mode
        default_entity_id: sensor.sbcp_playground_color_mode
        icon: mdi:palette-outline
        state: "{{ states('input_select.sbcp_color_mode') }}"
      - name: SBCP Playground Label Mode
        default_entity_id: sensor.sbcp_playground_label_mode
        icon: mdi:format-text
        state: "{{ states('input_select.sbcp_label_mode') }}"
      # Long-label entity for overflow and alignment checks.
      - name: Extremely Long Friendly Sensor Label For Alignment, Overflow, And Screenshot Testing
        default_entity_id: sensor.sbcp_playground_long_label
        unit_of_measurement: W
        icon: mdi:transmission-tower
        state: "{{ states('input_number.sbcp_current_value') | float(0) }}"
      # No icon attribute on purpose for missing-icon tests.
      - name: SBCP Playground No Icon
        default_entity_id: sensor.sbcp_playground_no_icon
        unit_of_measurement: W
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 0.82 + 5) | round(1) }}"
      - name: SBCP Playground Negative
        default_entity_id: sensor.sbcp_playground_negative
        unit_of_measurement: W
        icon: mdi:minus-circle-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) | abs * -1) | round(1) }}"
      - name: SBCP Playground Unavailable
        default_entity_id: sensor.sbcp_playground_unavailable
        icon: mdi:alert-circle-outline
        state: unavailable
      - name: SBCP Playground Unknown
        default_entity_id: sensor.sbcp_playground_unknown
        icon: mdi:help-circle-outline
        state: unknown
      - name: SBCP Playground Text State
        default_entity_id: sensor.sbcp_playground_text_state
        icon: mdi:message-alert-outline
        state: "{{ states('input_text.sbcp_custom_raw_state') }}"
      # Synthetic entities for multi-row rendering and stress tests.
      - name: SBCP Stress 01
        default_entity_id: sensor.sbcp_stress_01
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 0.35 + 6) | round(1) }}"
      - name: SBCP Stress 02
        default_entity_id: sensor.sbcp_stress_02
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 0.55 + 14) | round(1) }}"
      - name: SBCP Stress 03
        default_entity_id: sensor.sbcp_stress_03
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 0.75 + 22) | round(1) }}"
      - name: SBCP Stress 04
        default_entity_id: sensor.sbcp_stress_04
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 0.95 + 30) | round(1) }}"
      - name: SBCP Stress 05
        default_entity_id: sensor.sbcp_stress_05
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 1.05 + 12) | round(1) }}"
      - name: SBCP Stress 06
        default_entity_id: sensor.sbcp_stress_06
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 1.15 + 4) | round(1) }}"
      - name: SBCP Stress 07
        default_entity_id: sensor.sbcp_stress_07
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 1.35 - 8) | round(1) }}"
      - name: SBCP Stress 08
        default_entity_id: sensor.sbcp_stress_08
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 1.55 - 18) | round(1) }}"
      - name: SBCP Stress 09
        default_entity_id: sensor.sbcp_stress_09
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 0.45 + 40) | round(1) }}"
      - name: SBCP Stress 10
        default_entity_id: sensor.sbcp_stress_10
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 0.65 + 48) | round(1) }}"
      - name: SBCP Stress 11
        default_entity_id: sensor.sbcp_stress_11
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 0.85 + 56) | round(1) }}"
      - name: SBCP Stress 12
        default_entity_id: sensor.sbcp_stress_12
        unit_of_measurement: W
        icon: mdi:flash-outline
        state: "{{ (states('input_number.sbcp_current_value') | float(0) * 1.25 + 24) | round(1) }}"
      # Showcase-only synthetic telemetry. These are deterministic animated
      # entities for the promotional hero scene in the screenshots dashboard.
      - name: Daylight Progress
        default_entity_id: sensor.sbcp_showcase_daylight
        unit_of_measurement: '%'
        icon: mdi:white-balance-sunny
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (((sin((p - 90) * pi / 180) + 1) / 2) * 100) | round(1) }}
      - name: Solar Production
        default_entity_id: sensor.sbcp_showcase_solar
        unit_of_measurement: W
        icon: mdi:solar-power
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {% set base = ((sin((p - 90) * pi / 180) + 1) / 2) %}
          {% set shimmer = ((sin((p + 35) * pi / 180) + 1) / 2) %}
          {{ (base * 6200 + shimmer * 700) | round(1) }}
      - name: Home Battery
        default_entity_id: sensor.sbcp_showcase_battery
        unit_of_measurement: '%'
        icon: mdi:home-battery
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (58 + 24 * sin((p + 110) * pi / 180)) | round(1) }}
      - name: House Consumption
        default_entity_id: sensor.sbcp_showcase_consumption
        unit_of_measurement: W
        icon: mdi:home-lightning-bolt
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (1850 + 420 * sin((p + 40) * pi / 180) + 180 * sin((p * 2) * pi / 180)) | round(1) }}
      - name: Grid Flow
        default_entity_id: sensor.sbcp_showcase_grid
        unit_of_measurement: W
        icon: mdi:transmission-tower
        state: >-
          {% set solar = states('sensor.sbcp_hero_solar') | float(0) %}
          {% set ev = states('sensor.sbcp_showcase_ev') | float(0) %}
          {% set hour = states('sensor.sbcp_hero_daylight') | float(0) %}
          {% set daytime = (sin(((hour - 7) / 12) * pi) + 1) / 2 %}
          {% set house = 620 + 160 * daytime + 35 * sin((hour * 55 + 20) * pi / 180) + 22 * sin((hour * 120 - 5) * pi / 180) %}
          {{ (house + ev - solar) | round(1) }}
      - name: EV Charging
        default_entity_id: sensor.sbcp_showcase_ev
        unit_of_measurement: W
        icon: mdi:car-electric
        state: >-
          {% set hour = states('sensor.sbcp_hero_daylight') | float(0) %}
          {% set start_hour = 6 %}
          {% set charge_hours = 16.4 %}
          {% if hour >= start_hour and hour < (start_hour + charge_hours) %}
            4874
          {% else %}
            0
          {% endif %}
      - name: Outdoor Temperature
        default_entity_id: sensor.sbcp_showcase_outdoor_temp
        unit_of_measurement: °C
        icon: mdi:thermometer-lines
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (17 + 5.8 * sin((p - 70) * pi / 180)) | round(1) }}
      - name: Indoor Temperature
        default_entity_id: sensor.sbcp_showcase_indoor_temp
        unit_of_measurement: °C
        icon: mdi:sofa-outline
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (21.8 + 1.1 * sin((p + 25) * pi / 180)) | round(1) }}
      - name: Comfort Humidity
        default_entity_id: sensor.sbcp_showcase_humidity
        unit_of_measurement: '%'
        icon: mdi:water-percent
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (49 + 8 * sin((p + 155) * pi / 180)) | round(1) }}
      - name: UV Index
        default_entity_id: sensor.sbcp_showcase_uv
        unit_of_measurement: UVI
        icon: mdi:weather-sunny-alert
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ ((((sin((p - 90) * pi / 180) + 1) / 2) * 9.5)) | round(1) }}
      - name: Cloud Cover
        default_entity_id: sensor.sbcp_showcase_cloud_cover
        unit_of_measurement: '%'
        icon: mdi:weather-partly-cloudy
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (42 + 24 * sin((p + 210) * pi / 180) - 10 * sin((p * 2) * pi / 180)) | round(1) }}
      - name: CPU
        default_entity_id: sensor.sbcp_showcase_cpu
        unit_of_measurement: '%'
        icon: mdi:chip
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (36 + 11 * sin((p + 5) * pi / 180) + 4 * sin((p * 2 + 20) * pi / 180)) | round(1) }}
      - name: Network
        default_entity_id: sensor.sbcp_showcase_network
        unit_of_measurement: '%'
        icon: mdi:wifi
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (28 + 15 * sin((p + 50) * pi / 180)) | round(1) }}
      - name: Water
        default_entity_id: sensor.sbcp_showcase_water
        unit_of_measurement: '%'
        icon: mdi:water-outline
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (61 + 8 * sin((p + 125) * pi / 180)) | round(1) }}
      - name: Air
        default_entity_id: sensor.sbcp_showcase_air
        unit_of_measurement: '%'
        icon: mdi:air-filter
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (52 + 10 * sin((p + 185) * pi / 180)) | round(1) }}
      - name: Storage
        default_entity_id: sensor.sbcp_showcase_storage
        unit_of_measurement: '%'
        icon: mdi:database
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (73 + 5 * sin((p + 260) * pi / 180)) | round(1) }}
      - name: Latency
        default_entity_id: sensor.sbcp_showcase_latency
        unit_of_measurement: ms
        icon: mdi:timer-sand
        state: >-
          {% set p = states('input_number.sbcp_showcase_phase') | float(0) %}
          {{ (18 + 8 * sin((p + 320) * pi / 180)) | round(1) }}
      # AV baseline showcase telemetry. Fixed values chosen for visually clear
      # baseline screenshots with meaningful positive/negative deviation.
      - name: AV Balance
        default_entity_id: sensor.sbcp_showcase_av_balance
        unit_of_measurement: '%'
        icon: mdi:surround-sound
        state: "-8"
      - name: AV Pitch Offset
        default_entity_id: sensor.sbcp_showcase_av_pitch
        unit_of_measurement: cents
        icon: mdi:tune-vertical
        state: "34"
      - name: AV Phase Correlation
        default_entity_id: sensor.sbcp_showcase_av_phase
        icon: mdi:sine-wave
        state: "-0.68"
      - name: AV Tint Offset
        default_entity_id: sensor.sbcp_showcase_av_tint
        unit_of_measurement: '%'
        icon: mdi:palette-outline
        state: "42"
      - name: AV Exposure Bias
        default_entity_id: sensor.sbcp_showcase_av_exposure
        unit_of_measurement: EV
        icon: mdi:brightness-6
        state: "-2.1"
      - name: AV Keystone
        default_entity_id: sensor.sbcp_showcase_av_keystone
        unit_of_measurement: °
        icon: mdi:projector
        state: "41"
      # Hero-showcase telemetry. Slower, calmer motion for promo captures.
      - name: Simulated Hour
        default_entity_id: sensor.sbcp_hero_daylight
        unit_of_measurement: h
        icon: mdi:white-balance-sunny
        state: >-
          {% set t = states('input_number.sbcp_hero_phase') | float(0) %}
          {{ ((t % 86400) / 3600) | round(2) }}
      - name: Solar Production
        default_entity_id: sensor.sbcp_hero_solar
        unit_of_measurement: W
        icon: mdi:solar-power
        state: >-
          {% set hour = states('sensor.sbcp_hero_daylight') | float(0) %}
          {% set sunrise = 5.6 %}
          {% set sunset = 20.4 %}
          {% if hour <= sunrise or hour >= sunset %}
            0
          {% else %}
            {% set day_t = (hour - sunrise) / (sunset - sunrise) %}
            {% set sun = sin(day_t * pi) %}
            {% set envelope = sun ** 2.6 %}
            {% set skew = 0.985 + 0.03 * sin((day_t * 180 - 20) * pi / 180) %}
            {{ ([0, 5820 * envelope * skew] | max) | round(1) }}
          {% endif %}
      - name: Solar Energy Today
        default_entity_id: sensor.sbcp_hero_energy_today
        unit_of_measurement: kWh
        icon: mdi:solar-power-variant
        state: >-
          {% set hour = states('sensor.sbcp_hero_daylight') | float(0) %}
          {% set sunrise = 5.6 %}
          {% set sunset = 20.4 %}
          {% set steps = 96 %}
          {% set ns = namespace(total = 0) %}
          {% set dt = hour / steps %}
          {% for i in range(steps) %}
            {% set sample_hour = (i + 0.5) * dt %}
            {% if sample_hour > sunrise and sample_hour < sunset %}
              {% set day_t = (sample_hour - sunrise) / (sunset - sunrise) %}
              {% set sun = sin(day_t * pi) %}
              {% set envelope = sun ** 2.6 %}
              {% set skew = 0.985 + 0.03 * sin((day_t * 180 - 20) * pi / 180) %}
              {% set watts = [0, 5820 * envelope * skew] | max %}
              {% set ns.total = ns.total + (watts * dt / 1000) %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(2) }}
      - name: Grid Voltage
        default_entity_id: sensor.sbcp_hero_grid_voltage
        unit_of_measurement: V
        icon: mdi:sine-wave
        state: >-
          {% set hour = states('sensor.sbcp_hero_daylight') | float(0) %}
          {% set solar = states('sensor.sbcp_hero_solar') | float(0) %}
          {% set solar_frac = solar / 5820 %}
          {% if hour >= 7 and hour <= 12 %}
            {% set morning_lift = 5.1 * sin(((hour - 7) / 5) * pi) %}
          {% else %}
            {% set morning_lift = 0 %}
          {% endif %}
          {% if hour >= 16 and hour <= 23 %}
            {% set late_drop = 10.8 * sin(((hour - 16) / 7) * pi) %}
          {% else %}
            {% set late_drop = 0 %}
          {% endif %}
          {% if hour >= 19 and hour <= 21.4 %}
            {% set deep_dip = 14.4 * sin(((hour - 19) / 2.4) * pi) %}
          {% else %}
            {% set deep_dip = 0 %}
          {% endif %}
          {% if hour >= 22 and hour <= 24 %}
            {% set night_recovery = 3.8 * sin(((hour - 22) / 2) * pi) %}
          {% else %}
            {% set night_recovery = 0 %}
          {% endif %}
          {% set ripple_a = 1.9 * sin((hour * 24 + 10) * pi / 180) %}
          {% set ripple_b = 1.1 * sin((hour * 51 - 15) * pi / 180) %}
          {% set ripple_c = 0.7 * sin((hour * 83 + 120) * pi / 180) %}
          {% set voltage_spike_shift = 0 %}
          {% set spike_hour = 17 + voltage_spike_shift %}
          {% set spike_width = 2.2 %}
          {% set spike_strength = 13.5 %}
          {% if hour >= spike_hour - spike_width / 2 and hour <= spike_hour + spike_width / 2 %}
            {% set high_voltage_bump = spike_strength * sin(((hour - (spike_hour - spike_width / 2)) / spike_width) * pi) %}
          {% else %}
            {% set high_voltage_bump = 0 %}
          {% endif %}
          {% set voltage = 228.6 + 16.9 * solar_frac + morning_lift + high_voltage_bump - late_drop - deep_dip + night_recovery + ripple_a + ripple_b + ripple_c %}
          {{ voltage | round(1) }}
      - name: EV State Of Charge
        default_entity_id: sensor.sbcp_hero_ev_soc
        unit_of_measurement: '%'
        icon: mdi:car-electric
        state: >-
          {% set hour = states('sensor.sbcp_hero_daylight') | float(0) %}
          {% set start_hour = 6 %}
          {% set charge_hours = 16.4 %}
          {% set charged_hours = [charge_hours, [0, hour - start_hour] | max] | min %}
          {{ ([100, 18 + charged_hours * 5] | min) | round(1) }}
      - name: Home Battery Power
        default_entity_id: sensor.sbcp_hero_battery
        unit_of_measurement: W
        icon: mdi:home-battery-outline
        state: >-
          {% set solar = states('sensor.sbcp_hero_solar') | float(0) %}
          {% set house = states('sensor.sbcp_hero_consumption') | float(0) %}
          {{ (solar - house) | round(1) }}
      - name: House Consumption
        default_entity_id: sensor.sbcp_hero_consumption
        unit_of_measurement: W
        icon: mdi:home-lightning-bolt
        state: >-
          {% set p = states('input_number.sbcp_hero_phase') | float(0) %}
          {% set cycle = (p % 360) / 360 %}
          {% set day_start = 1 / 6 %}
          {% set day_end = 5 / 6 %}
          {% set day_fraction = day_end - day_start %}
          {% if cycle <= day_start or cycle >= day_end %}
            {% set daylight = 0 %}
          {% else %}
            {% set day_t = (cycle - day_start) / day_fraction %}
            {% set sun_shape = sin(day_t * pi) %}
            {% set circadian = sun_shape ** 0.82 %}
            {% set daylight = circadian * circadian * (3 - 2 * circadian) %}
          {% endif %}
          {{ (1650 + 520 * daylight + 250 * sin((p + 20) * pi / 180) + 120 * sin((p * 2 + 10) * pi / 180)) | round(1) }}
      - name: Grid Carbon Intensity
        default_entity_id: sensor.sbcp_hero_grid_intensity
        unit_of_measurement: gCO2/kWh
        icon: mdi:leaf-circle-outline
        state: >-
          {% set p = states('input_number.sbcp_hero_phase') | float(0) %}
          {% set cycle = (p % 360) / 360 %}
          {% set day_start = 1 / 6 %}
          {% set day_end = 5 / 6 %}
          {% set day_fraction = day_end - day_start %}
          {% if cycle <= day_start or cycle >= day_end %}
            {% set daylight = 0 %}
          {% else %}
            {% set day_t = (cycle - day_start) / day_fraction %}
            {% set sun_shape = sin(day_t * pi) %}
            {% set circadian = sun_shape ** 0.82 %}
            {% set daylight = circadian * circadian * (3 - 2 * circadian) %}
          {% endif %}
          {% set night_bias = 1 - daylight %}
          {{ (185 + 160 * night_bias + 22 * sin((p + 35) * pi / 180) + 10 * sin((p * 2 - 15) * pi / 180)) | round(1) }}
  - sensor:
      - name: SBCP Playground Baseline
        default_entity_id: sensor.sbcp_playground_baseline
        unit_of_measurement: W
        icon: mdi:vector-line
        state: "{{ states('input_number.sbcp_baseline_value') | float(0) }}"

script:
  sbcp_hero_phase_back_1h:
    alias: SBCP Hero Phase Back 1h
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.sbcp_hero_phase
        data:
          value: >-
            {{ ((states('input_number.sbcp_hero_phase') | float(0) - 3600) % 86400) | round(1) }}

  sbcp_hero_phase_forward_1h:
    alias: SBCP Hero Phase Forward 1h
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.sbcp_hero_phase
        data:
          value: >-
            {{ ((states('input_number.sbcp_hero_phase') | float(0) + 3600) % 86400) | round(1) }}

automation:
  - id: sbcp_quick_slider_sync
    alias: SBCP Quick Slider Sync
    description: Keep quick sliders and numeric helper values aligned where safe.
    trigger:
      - platform: state
        entity_id: input_number.sbcp_current_quick
        id: current_quick
      - platform: state
        entity_id: input_number.sbcp_target_quick
        id: target_quick
      - platform: state
        entity_id: input_number.sbcp_baseline_quick
        id: baseline_quick
      - platform: state
        entity_id: input_number.sbcp_current_value
        id: current_value
      - platform: state
        entity_id: input_number.sbcp_target_value
        id: target_value
      - platform: state
        entity_id: input_number.sbcp_baseline_value
        id: baseline_value
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: current_quick
              - condition: template
                value_template: >-
                  {% set numeric = states('input_number.sbcp_current_value') | float(0) %}
                  {% set quick = states('input_number.sbcp_current_quick') | float(0) %}
                  {{ (numeric - quick) | abs > 0.01 }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sbcp_current_value
                data:
                  value: "{{ states('input_number.sbcp_current_quick') | float(0) }}"
          - conditions:
              - condition: trigger
                id: target_quick
              - condition: template
                value_template: >-
                  {% set numeric = states('input_number.sbcp_target_value') | float(0) %}
                  {% set quick = states('input_number.sbcp_target_quick') | float(0) %}
                  {{ (numeric - quick) | abs > 0.01 }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sbcp_target_value
                data:
                  value: "{{ states('input_number.sbcp_target_quick') | float(0) }}"
          - conditions:
              - condition: trigger
                id: baseline_quick
              - condition: template
                value_template: >-
                  {% set numeric = states('input_number.sbcp_baseline_value') | float(0) %}
                  {% set quick = states('input_number.sbcp_baseline_quick') | float(0) %}
                  {{ (numeric - quick) | abs > 0.01 }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sbcp_baseline_value
                data:
                  value: "{{ states('input_number.sbcp_baseline_quick') | float(0) }}"
          - conditions:
              - condition: trigger
                id: current_value
              - condition: template
                value_template: >-
                  {% set value = states('input_number.sbcp_current_value') | float(0) %}
                  {% set quick = states('input_number.sbcp_current_quick') | float(0) %}
                  {{ value >= -100 and value <= 100 and (value - quick) | abs > 0.01 }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sbcp_current_quick
                data:
                  value: "{{ states('input_number.sbcp_current_value') | float(0) }}"
          - conditions:
              - condition: trigger
                id: target_value
              - condition: template
                value_template: >-
                  {% set value = states('input_number.sbcp_target_value') | float(0) %}
                  {% set quick = states('input_number.sbcp_target_quick') | float(0) %}
                  {{ value >= -100 and value <= 100 and (value - quick) | abs > 0.01 }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sbcp_target_quick
                data:
                  value: "{{ states('input_number.sbcp_target_value') | float(0) }}"
          - conditions:
              - condition: trigger
                id: baseline_value
              - condition: template
                value_template: >-
                  {% set value = states('input_number.sbcp_baseline_value') | float(0) %}
                  {% set quick = states('input_number.sbcp_baseline_quick') | float(0) %}
                  {{ value >= -100 and value <= 100 and (value - quick) | abs > 0.01 }}
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sbcp_baseline_quick
                data:
                  value: "{{ states('input_number.sbcp_baseline_value') | float(0) }}"
    mode: queued

  - id: sbcp_wave_driver
    alias: SBCP Wave Driver
    description: Drive the selected playground helper from a selectable waveform.
    trigger:
      - platform: time_pattern
        seconds: "/1"
    condition:
      - condition: state
        entity_id: input_boolean.sbcp_wave_enabled
        state: "on"
    action:
      - variables:
          wave_value: >-
            {% set min_v = states('input_number.sbcp_min_value') | float(0) %}
            {% set max_v = states('input_number.sbcp_max_value') | float(100) %}
            {% set period = states('input_number.sbcp_wave_period') | float(12) %}
            {% set cycle = ((as_timestamp(now()) % period) / period) if period > 0 else 0 %}
            {% set center = (min_v + max_v) / 2 %}
            {% set amplitude = ((max_v - min_v) / 2) | abs %}
            {% set waveform = states('input_select.sbcp_waveform') %}
            {% if waveform == 'random' %}
              {{ ((range(-2000, 5001) | random) / 10) | round(1) }}
            {% elif waveform == 'triangle' %}
              {% set wave = 1 - 4 * ((cycle - 0.5) | abs) %}
              {{ (center + amplitude * wave) | round(1) }}
            {% else %}
              {% set wave = sin(cycle * 2 * pi) %}
              {{ (center + amplitude * wave) | round(1) }}
            {% endif %}
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.sbcp_wave_target
                state: target_value
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sbcp_target_value
                data:
                  value: "{{ wave_value }}"
          - conditions:
              - condition: state
                entity_id: input_select.sbcp_wave_target
                state: baseline_value
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.sbcp_baseline_value
                data:
                  value: "{{ wave_value }}"
        default:
          - service: input_number.set_value
            target:
              entity_id: input_number.sbcp_current_value
            data:
              value: "{{ wave_value }}"
    mode: single

  - id: sbcp_showcase_phase_driver
    alias: SBCP Showcase Phase Driver
    description: Loop a deterministic showcase phase for cinematic demo views.
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: input_boolean.sbcp_showcase_enabled
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.sbcp_showcase_enabled
        state: "on"
    action:
      - repeat:
          while:
            - condition: state
              entity_id: input_boolean.sbcp_showcase_enabled
              state: "on"
          sequence:
            - variables:
                next_phase: >-
                  {{ ((states('input_number.sbcp_showcase_phase') | int(0) + 15) % 360) }}
            - service: input_number.set_value
              target:
                entity_id: input_number.sbcp_showcase_phase
              data:
                value: "{{ next_phase }}"
            - delay:
                milliseconds: 250
    mode: restart

  - id: sbcp_hero_showcase_phase_driver
    alias: SBCP Hero Simulation Driver
    description: Drive the shared simulated clock for the hero showcase sensors.
    trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: automation_reloaded
      - platform: state
        entity_id: input_boolean.sbcp_hero_showcase_enabled
        to: "on"
      - platform: state
        entity_id: input_boolean.sbcp_hero_simulation_enabled
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.sbcp_hero_showcase_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.sbcp_hero_simulation_enabled
        state: "on"
    action:
      - repeat:
          while:
            - condition: state
              entity_id: input_boolean.sbcp_hero_showcase_enabled
              state: "on"
            - condition: state
              entity_id: input_boolean.sbcp_hero_simulation_enabled
              state: "on"
          sequence:
            - variables:
                tick_seconds: 0.1
                speed: "{{ states('input_number.sbcp_hero_simulation_speed') | float(3600) }}"
                next_phase: >-
                  {{ ((states('input_number.sbcp_hero_phase') | float(0) + speed * tick_seconds) % 86400) | round(1) }}
            - service: input_number.set_value
              target:
                entity_id: input_number.sbcp_hero_phase
              data:
                value: "{{ next_phase }}"
            - delay:
                milliseconds: 100
    mode: restart
    
